name: Docker Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: docker.io

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Docker Hub credentials
        shell: bash
        env:
          DOCKERHUB_USERNAME_SECRET: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_USERNAME_VAR: ${{ vars.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN_SECRET: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_TOKEN_VAR: ${{ vars.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          USERNAME="${DOCKERHUB_USERNAME_SECRET:-${DOCKERHUB_USERNAME_VAR:-}}"
          TOKEN="${DOCKERHUB_TOKEN_SECRET:-${DOCKERHUB_TOKEN_VAR:-}}"

          USERNAME="$(echo "$USERNAME" | xargs)"
          TOKEN="$(echo "$TOKEN" | xargs)"

          if [ -z "$USERNAME" ]; then
            echo "DOCKERHUB_USERNAME is empty. Set it in GitHub Actions Secrets or Variables." >&2
            exit 1
          fi

          if [ -z "$TOKEN" ]; then
            echo "DOCKERHUB_TOKEN is empty. Set it in GitHub Actions Secrets or Variables." >&2
            exit 1
          fi

          USERNAME_LOWER="$(echo "$USERNAME" | tr '[:upper:]' '[:lower:]')"

          {
            echo "DOCKERHUB_USERNAME_RESOLVED=$USERNAME"
            echo "DOCKERHUB_TOKEN_RESOLVED=$TOKEN"
            echo "IMAGE_NAME=${USERNAME_LOWER}/codeagent-personal"
          } >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME_RESOLVED }}
          password: ${{ env.DOCKERHUB_TOKEN_RESOLVED }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
