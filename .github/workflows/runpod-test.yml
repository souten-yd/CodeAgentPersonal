name: Runpod / Windows smoke test

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'main.py'
      - 'benchmark_mem.py'
      - 'README.md'
      - '.github/workflows/runpod-test.yml'
      - 'scripts/setup_runpod_ubuntu.sh'
      - 'scripts/setup_llama_runpod.sh'
      - 'scripts/runpod_start.sh'
      - 'scripts/check_environment.py'
  pull_request:
    paths:
      - 'main.py'
      - 'benchmark_mem.py'
      - 'README.md'
      - '.github/workflows/runpod-test.yml'
      - 'scripts/setup_runpod_ubuntu.sh'
      - 'scripts/setup_llama_runpod.sh'
      - 'scripts/runpod_start.sh'
      - 'scripts/check_environment.py'

env:
  PYTHON_VERSION: '3.11'
  PIP_PACKAGES: ${{ vars.CI_PIP_PACKAGES || 'fastapi uvicorn requests pydantic psutil nvidia-ml-py' }}
  RUNPOD_SMOKE_ENABLED: ${{ vars.RUNPOD_SMOKE_ENABLED || 'false' }}
  DOCKER_IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME || 'codeagent-smoke' }}

jobs:

  docker-smoke:
    name: Docker smoke (python:3.11-slim parity)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build smoke image
        run: |
          docker build \
            -f .github/docker/smoke.Dockerfile \
            --build-arg PIP_PACKAGES="${PIP_PACKAGES}" \
            -t codeagent-smoke:latest \
            .

      - name: Run smoke container
        run: |
          docker run --rm codeagent-smoke:latest

  windows-smoke:
    name: Windows smoke (NVIDIA / Vulkan)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verify Python version
        shell: pwsh
        run: |
          python -c "import sys; print(sys.version)"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          $packages = @($env:PIP_PACKAGES -split '\s+' | Where-Object { $_ -and $_.Trim() -ne '' })
          if ($packages.Count -eq 0) {
            Write-Host 'No extra pip packages configured.'
          } else {
            python -m pip install @packages
          }

      - name: Smoke check
        shell: pwsh
        run: |
          python scripts/check_environment.py --expect-python $env:PYTHON_VERSION

      - name: Vulkan runtime check (best effort)
        shell: pwsh
        run: |
          $vulkanInfo = Get-Command vulkaninfo -ErrorAction SilentlyContinue
          if ($null -eq $vulkanInfo) {
            Write-Host 'vulkaninfo was not found on windows-latest (this is acceptable for hosted runner).'
          } else {
            vulkaninfo --summary
          }

  runpod-smoke:
    name: Runpod smoke (self-hosted NVIDIA)
    if: ${{ vars.RUNPOD_SMOKE_ENABLED == 'true' }}
    timeout-minutes: 30
    runs-on: [self-hosted, linux, x64, nvidia, runpod]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure required host packages
        run: |
          bash scripts/setup_runpod_ubuntu.sh --ci

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install llama.cpp Linux CUDA package
        run: |
          bash scripts/setup_llama_runpod.sh --build-if-needed

      - name: Verify NVIDIA and Vulkan
        run: |
          nvidia-smi
          if command -v vulkaninfo >/dev/null 2>&1; then
            vulkaninfo --summary || true
          else
            echo 'vulkaninfo not found. Install vulkan-tools on the runner host.'
          fi

      - name: Verify Docker
        run: |
          docker --version
          docker info >/dev/null

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          PKGS=$(echo "${PIP_PACKAGES}" | xargs)
          if [ -n "${PKGS}" ]; then
            python -m pip install ${PKGS}
          else
            echo "No extra pip packages configured."
          fi

      - name: Smoke check
        run: |
          python scripts/check_environment.py --expect-python ${PYTHON_VERSION}

      - name: Resolve Docker image repository (Docker Hub only)
        run: |
          if [ -z "${{ vars.DOCKERHUB_USERNAME }}" ]; then
            echo 'vars.DOCKERHUB_USERNAME is required for Runpod Docker tagging.'
            exit 1
          fi
          IMAGE_REPO="${{ vars.DOCKERHUB_USERNAME }}/${DOCKER_IMAGE_NAME}"
          case "${IMAGE_REPO}" in
            ghcr.io/*)
              echo 'ghcr.io is not allowed for this workflow.'
              exit 1
              ;;
          esac
          echo "IMAGE_REPO=${IMAGE_REPO}" >> "${GITHUB_ENV}"

      - name: Build Runpod Docker image
        run: |
          docker build \
            -f .github/docker/smoke.Dockerfile \
            --build-arg PIP_PACKAGES="${PIP_PACKAGES}" \
            -t "${IMAGE_REPO}:runpod-${GITHUB_SHA}" \
            -t "${IMAGE_REPO}:runpod-latest" \
            .

      - name: Login to Docker Hub
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Runpod Docker image
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          docker push "${IMAGE_REPO}:runpod-${GITHUB_SHA}"
          docker push "${IMAGE_REPO}:runpod-latest"
