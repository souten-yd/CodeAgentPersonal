<svg xmlns="http://www.w3.org/2000/svg"
     width="820" height="260" viewBox="0 0 820 260"
     role="img" aria-label="Kasane Core">
  <defs>
    <linearGradient id="ringStrokeB" x1="50" y1="20" x2="235" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="var(--logo-accent-strong, var(--accent))"/>
      <stop offset="0.45" stop-color="var(--logo-accent, var(--accent))"/>
      <stop offset="1" stop-color="var(--logo-text, var(--text))"/>
    </linearGradient>
    <linearGradient id="textFillB" x1="190" y1="70" x2="610" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="var(--logo-text, var(--text))"/>
      <stop offset="0.55" stop-color="var(--logo-accent-strong, var(--accent))"/>
      <stop offset="1" stop-color="var(--logo-accent, var(--accent))"/>
    </linearGradient>
    <filter id="softDepthB" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.2" flood-color="var(--logo-accent-strong, var(--accent))" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g transform="translate(36 26)"
     fill="none"
     stroke="url(#ringStrokeB)"
     stroke-linecap="round"
     stroke-linejoin="round"
     filter="url(#softDepthB)">
    <circle  cx="110" cy="102" r="82" stroke-width="5.8"/>
    <ellipse cx="107" cy="103" rx="77" ry="83" stroke-width="4.9" transform="rotate(-13 107 103)" opacity="0.96"/>
    <ellipse cx="112" cy="101" rx="82" ry="71" stroke-width="4.7" transform="rotate(10 112 101)" opacity="0.92"/>
    <ellipse cx="111" cy="103" rx="69" ry="61" stroke-width="4.3" transform="rotate(23 111 103)" opacity="0.90"/>
    <ellipse cx="107" cy="103" rx="61" ry="69" stroke-width="4.1" transform="rotate(-19 107 103)" opacity="0.82"/>
    <circle  cx="110" cy="102" r="46" stroke-width="5.1" opacity="0.86"/>
    <circle  cx="110" cy="102" r="24" stroke-width="4.7" opacity="0.82"/>
  </g>

  <g transform="translate(36 26)" aria-hidden="true">
    <circle cx="110" cy="102" r="8" fill="var(--accent, #00ff88)"/>
    <circle cx="110" cy="102" r="12" fill="none" stroke="var(--accent, #00ff88)" stroke-opacity="0.45" stroke-width="1.2"/>
  </g>

  <g fill="url(#textFillB)"
     filter="url(#softDepthB)"
     font-family="'Avenir Next','Montserrat','Segoe UI',Arial,sans-serif">
    <text x="605" y="128" text-anchor="end"
          font-size="100" font-weight="800" letter-spacing="-1.8">Kasane</text>
    <text x="605" y="196" text-anchor="end"
          font-size="64" font-weight="500" letter-spacing="-1.0">Core</text>
  </g>
</svg>
