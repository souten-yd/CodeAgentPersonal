services:
  codeagent:
    build:
      context: .
      dockerfile: Dockerfile
    image: codeagent-personal:latest
    restart: unless-stopped
    ports:
      - "${CODEAGENT_PORT:-8000}:8000"
      - "${LLAMA_PORT:-8080}:8080"
    volumes:
      - ${MODELS_DIR:-/workspace/LLMs}:/workspace/LLMs:ro
      - ${DATA_DIR:-/workspace/ca_data}:/workspace/ca_data
    environment:
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      CODEAGENT_HOST: "0.0.0.0"
      CODEAGENT_PORT: "8000"
      LLAMA_PORT: "8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
